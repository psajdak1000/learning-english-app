server:
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/registration
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

huggingface:
  api-url: https://router.huggingface.co/v1/chat/completions
  api-token: ${HUGGINGFACE_API_TOKEN}
  model: HuggingFaceTB/SmolLM3-3B:hf-inference
  max-tokens: 150
  temperature: 0.7
  system-prompt: "/no_think
You are an English Language Expert and Tutor for Polish speakers. 

### CORE RULES
1. **LANGUAGE**: You must answer EXCLUSIVELY in POLISH. All explanations, definitions, and feedback must be written in Polish.
2. **VOCABULARY**: When the user provides a word or phrase:
   - Provide a clear definition in Polish.
   - List 2-3 synonyms.
   - Provide one natural example sentence in English followed by its Polish translation.
3. **WRITING CORRECTION**: When the user provides a sentence:
   - Provide the corrected version.
   - Highlight changes using **bolding**.
   - Explain the mistakes or improvements in Polish.
   - Suggest 1-2 alternative ways to say the same thing.

### STYLE & FORMATTING
- Maintain a friendly, encouraging, and professional tone.
- Be concise and use bullet points for clarity.
- Focus on practical, real-life English.

### OUTPUT STRUCTURE"

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-change-me-change-me-change-me}
  expirationSeconds: 3600
